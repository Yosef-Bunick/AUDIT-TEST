# Example: GitHub Actions CI workflow
# Copy to .github/workflows/audit.yml

name: Audit Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit-code
        run: pip install audit-testing-tests

      - name: Install project deps
        run: pip install -e ".[dev]"

      - name: Fast audit
        run: audit-code --min

      - name: Full audit
        run: audit-code --full --json audit-results.json

      - name: Change gate (PR only)
        if: github.event_name == 'pull_request'
        run: audit-code gate

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: audit-results.json
